<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion en cours...</title>

    <script async crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_ZmxleGlibGUtd2FydGhvZy03MC5jbGVyay5hY2NvdW50cy5kZXYk"
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js" type="text/javascript">
        </script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Inter", sans-serif;
            background-color: #FAFBFE;
        }

        .container {
            text-align: center;
        }

        .spinner {
            border: 4px solid #E3E8F5;
            border-top: 4px solid #6C83D9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        p {
            color: #2E3F84;
            margin-top: 20px;
            font-weight: 600;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Connexion sécurisée en cours...</p>
    </div>

    <script>
        // Dès que Clerk est chargé, on lui demande de finaliser la connexion Google
        window.addEventListener('load', async function () {
            if (window.Clerk) {
                await window.Clerk.load();
                // Clerk valide le token Google, puis nous jette sur la page d'accueil
                window.Clerk.handleRedirectCallback({
                    redirectUrl: '/index.html'
                });
            }
        });
    </script>
</body>

</html>
